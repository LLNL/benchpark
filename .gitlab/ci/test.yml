test_run:
  stage: test
  tags:
    - $HOST
    - shell
  <<: *test_clusters
  rules:
    - changes:
        - .gitlab-ci.yml
        - .gitlab/ci/*
        - experiments/**
        - systems/**
        - repo/**
        - modifiers/**
        - var/**
        - lib/**
  script:
    - . /usr/workspace/benchpark-dev/benchpark-venv/$SYS_TYPE/bin/activate
    # Build Saxpy Workspace
    - ./bin/benchpark setup saxpy/openmp $ARCHCONFIG workspace/
    # Setup Ramble & Spack
    - . workspace/setup.sh
    - spack mirror add ci-buildcache oci://ghcr.io/llnl/benchpark-binary-cache
    - spack config add "packages:all:target:[x86_64_v3]"
    # Setup Saxpy Workspace
    - cd ./workspace/saxpy/openmp/$ARCHCONFIG/workspace/
    - ramble --workspace-dir . --disable-progress-bar --disable-logger -c config:spack_flags:install:'--no-check-signature' workspace setup
    # Run Saxpy Experiments
    - srun -N 1 --reservation=ci --time=01:00:00 ramble --workspace-dir . --disable-progress-bar --disable-logger on --executor '{execute_experiment}' --where '{n_nodes} == 1'
