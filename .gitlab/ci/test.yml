.test_clusters: &test_clusters
  parallel:
    matrix:
      - HOST:
          - tioga
          - dane

test_run:
  stage: test
  tags:
    - $HOST
    - shell
  <<: *test_clusters
  rules:
    - changes:
        - .gitlab-ci.yml
        - .gitlab/ci/*
        - experiments/**
        - systems/**
        - repo/**
        - modifiers/**
        - var/**
        - lib/**
  script:
    # Build Saxpy Workspace
    - ./bin/benchpark setup saxpy/openmp LLNL-Dane-DELL-sapphirerapids-OmniPath workspace/
    # Setup Ramble & Spack
    - . workspace/setup.sh
    - spack mirror add ci-buildcache oci://ghcr.io/llnl/benchpark-binary-cache
    - spack config add "packages:all:target:[x86_64_v3]"
    - env | grep SPACK >> "$GITHUB_ENV"
    - env | grep RAMBLE >> "$GITHUB_ENV"
    - echo "PATH=$PATH" >> "$GITHUB_ENV"
    # Setup Saxpy Workspace
    - cd ./workspace/saxpy/openmp/LLNL-Dane-DELL-sapphirerapids-OmniPath/workspace/
    - ramble --workspace-dir . --disable-progress-bar --disable-logger -c config:spack_flags:install:'--no-check-signature' workspace setup
    # Run Saxpy Experiments
    - srun -N 1 -ppci --time=0l:00:00 ramble --workspace-dir . --disable-progress-bar --disable-logger on --executor '{execute_experiment}' --where '{n_nodes} == 1'

